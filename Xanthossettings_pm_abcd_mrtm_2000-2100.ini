#****************************** RUNOFF %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%


# Set runoff module type and individual parameters
[Runoff]

# name of the runoff module you wish to use (gwam or abcd)
# The name of the runoff model to be used. Currently supported: abcd (for ABCD), gwam (for GWAM), and none (for cases where the user will provide their own runoff input file).
runoff_module               = abcd
# MAAC runoff_module               = gwam

# parameters is using the ABCD model
[[abcd]]
# source directory name for the ABCD runoff module
# The directory name of the runoff module chosen where its input files are stored
runoff_dir                  = abcd

# calibration parameters file with path for ABCDM per basin
# File name with extension of calibrated ABCDM parameters for each basin. Array must be 2-D, where (basin_idx, param_idx). File must be saved as a NumPy array file (.npy).
calib_file                  = pars_watch_1971_1990_decadal_lc.npy

# MAAC. the number of months from the start of the data that you wish to use for spin up, as an integer
runoff_spinup               = 240  #372

# the number of jobs to use when running basins parallel (-2, all but one core; -1, all cores; 8, 8 cores)
jobs                        = -1

# minimum temperature file that is stored in the model directory in deg C
# File name and extension to input mean monthly daily minimum surface air temperature file in degree Celsius. File can be a NumPy array file (.npy) or a NetCDF Classic file (.nc).
#MAAC TempMinFile                 = /home/miguel/zClimrisk/Xanthos/example/input/climate/tasmin_watch_monthly_degc_1971_2001.npy
TempMinFile                 = /home/miguel/zClimrisk/Xanthos/example/input/pet/hargreavesMAAC/tasmin_watch_monthly_degc_.npy

# monthly average precipitation in mm/mth
# File name and extension to input mean monthly preciptation file in mm/month. Array must be 2-D, where (gridcell_idx, month_idx). File can be a NumPy array file (.npy) or a NetCDF Classic file (.nc).
#MAAC PrecipitationFile           = /home/miguel/zClimrisk/Xanthos/example/input/climate/pr_gpcc_watch_monthly_mmpermth_1971_2001.npy
PrecipitationFile           = /home/miguel/zClimrisk/Xanthos/example/input/pet/hargreavesMAAC/pr_gpcc_watch_monthly_mmpermth_.npy


####### ********** MAAC  Opcion de metodo gwam para Escurrimiento Futuro Runoff

# parameters is using the ABCD model
[[gwam]]
# source directory name for the gwam runoff module
# The directory name of the runoff module chosen where its input files are stored
runoff_dir                  = gwam

# File name and extension to input mean monthly precipitation file in mm/month. Array must be 2-D, where (gridcell_idx, month_idx). File can be a NumPy array file (.npy) or a NetCDF Classic file (.nc).
#MAAC PrecipitationFile = pr_gpcc_watch_monthly_mmpermth_1971_2001.npy
PrecipitationFile = pr_gpcc_watch_monthly_mmpermth_2021_2041.npy

# File of maximum soil moisture (gridcells x 1) in mm/month.
max_soil_moisture  = soil_moisture.csv

# File of water bodies: assign MSM = 999, 306 x 2, Col 1 is the cell number in 67420.
lakes_msm = Lakes_wo_casp.csv

# File of additional water bodies: assign MSM = 999, 421 x 2, Col 1 is the cell number in 67420.
addit_water_msm = Addit_water421.csv


####### ********** MAAC
#****************************** ROUTING %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

# Set routing module type and individual parameters
[Routing]
# name of the routing module you wish to use (mrtm)
# The reference name of the routing model to be used. Currently supported: mrtm (for MRTM), and none (for cases where the user does not which to run the routing module).
routing_module              = mrtm

[[mrtm]]
# directory name of the routing model
# The directory name of the routing module chosen where its input files are stored
routing_dir                 = mrtm

# spin-up in months for the router
# MAAC. The number of months from the start of the data that will be used to spin-up the data as an integer.
routing_spinup              = 240 #372

# channel velocity
# File name with extension of the input channel velocity in m/s. Array must be 2-D DRT data (280 x 720). File can be a NumPy array file (.npy).
channel_velocity            = velocity_half_degree.npy

# flow distance
# File name with extension of flow distance (m).
flow_distance               = DRT_half_FDISTANCE_globe.txt

# flow direction
# File name with extension of flow direction. Array must be 2-D, containing bitwise values of flow codes.
flow_direction              = DRT_half_FDR_globe_bystr50.txt


[Diagnostics]
# Comparison with other models:
#   Estimates of average total annual runoff (km^3/yr)
#   The comparison data file needs to be preprocessed.
#   Unit: km3/year
#   Runoff
#   - VIC     The major comparison, Dimension: (67420, 30)
#   - WBM     Ref comparison: WBM (Fekete et al., 2000) and WBMc (Fekete et al., 2000)
#             are also used as additional comparisons (2 column csv files), Dimension: (67420, 1)
#   - UNH     Ref comparison: averaged UNH-GRDC 1986-1995, Dimension: (67420, 1)
VICDataFile                 = vic_watch_hist_nosoc_co2_qtot_global_annual_1971_2000.nc
WBMDataFile                 = wbm_qestimates.csv
WBMCDataFile                = wbmc_qestimates.csv
UNHDataFile                 = UNH_GRDC_average_annual_1986_1995.nc

# Define the Scale to use for Runoff Diagnostics : 0 = All (default), 1 = Basin, 2 = Country, 3 = Region
Scale                       = 1


[Drought]
# The drought statistics post-processing module. It can be used to either
# calculate quantile-based drought thresholds, or to compute Severity,
# Intensity, and Duration statistics.
#
# If the parameter drought_thresholds is provided, drought statistics will be
# outputted, otherwise thresholds will be calculated.

# Which output variable to use, either 'q' (runoff) or 'soilmoisture' (soil moisture)
drought_var                 = q

# Inclusive year range over which to calculate drought thresholds
threshold_start_year        = 2000 #1971
threshold_end_year          = 2100

# Number of periods to calculate thresholds for.  Generally either 1 (single
# threshold for all periods), or 12 (thresholds by month)
threshold_nper              = 12


[AccessibleWater]
# Reference data for accessible water module
# Reservoir capacity at basin level
# Baseflow index (BFI) file as a CSV.
# File name with extension of the reservior storage capacity file as a CSV.
ResCapacityFile             = total_reservoir_storage_capacity_BM3.csv
BfiFile                     = bfi_per_basin.csv

# HistEndYear: End year of historical data, e.g. 2005
# The start year YYYY of the Global Change Analysis Model (GCAM) to provide data for.
# The end year YYYY of GCAM to provide data for.
# The time step in years as an integer to process
HistEndYear                 = 2020
GCAM_StartYear              = 2000 #1971
GCAM_EndYear                = 2100
GCAM_YearStep               = 1

# A parameter for moving average
MovingMeanWindow            = 9

# Used to calculate Environmental Flow Requirements (EFR) per basin, for example, use 10% of historical mean
# A fractional decimal from 0 to 1.0 to calculate environmental flow requirements per basin.
Env_FlowPercent             = 0.07


[HydropowerPotential]
# Inputs to hydropower potential module

# Start date in M/YYYY format
hpot_start_date             = "1/2000" #"1/1971"

# Quantile of monthly flow above which additional power is unavailable; values from 0.0 to 1.0
q_ex                        = 0.8

# Plant efficiency; values from 0.0 to 1.0
ef                          = 0.75


[HydropowerActual]
# Input to hydropower dam simulation module

# Start date in M/YYYY format
hact_start_date             = "1/2000" #"1/1971"


[TimeSeriesPlot]
# Define the level of plotting: 999 = plot all; 0 = only global total; 1 = only by basin id
Scale              = 1
MapID              = 999
