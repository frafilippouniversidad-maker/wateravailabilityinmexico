## **OJO Note that npy file should NOT have grid id in it.

# MAAC. project name
ProjectName                 = pm_abcd_mrtm_watch_2000-2100

# MAAC. full path to directory containing input and output directories
RootDir                     = /home/miguel/zClimrisk/Xanthos/example

# input directory name contained in root
InputFolder                 = input

# output directory name containined in root
OutputFolder                = output

# directory name where the reference data is contained in the input directory
RefDir                      = reference

# directory name where PET dir is
pet_dir                     = pet

# directory name where the routing data is contained in the input directory
RoutingDir                  = routing

# directory name where the runoff data is contained in the input directory
RunoffDir                   = runoff

# directory name where the diagnostics directory is contained in the input directory
DiagDir                     = diagnostics

# directory name where the accessible water input file directory is contained
AccWatDir                   = accessible_water

# directory name where the hydropower potential input file directory is contained
HydActDir                   = hydropower_actual

# MAAC. HistFlag = True, historic mode ; = False, future mode
#If True, channel storage and soil moisture files are saved; if False (se selecciona para futuro), channel storage and soil moisture files are loaded when using the GWAM runoff module.
HistFlag                    = False  #True

# number of basins to process
n_basins                    = 235

# MAAC. start and end year of the run
StartYear                   = 2000 #1971
EndYear                     = 2100

# MAAC. which variables to output, any of:
#   - 'pet' (potential evapotranspiration)
#   - 'aet' (actual evapotranspiration)
#   - 'q' (runoff)
#   - 'soilmoisture' (soil moisture)
#   - 'avgchflow' (average channel flow)
#output_vars                 = pet, aet, q, soilmoisture, avgchflow
output_vars                 = pet, aet, q, soilmoisture, avgchflow

# output format; one of 0 (netcdf file), 1 (csv file), 2 (matlab file), 3 (parquet file)
OutputFormat                = 1

# Default output unit is 0 = mm/month, 1 = km3/month
OutputUnit                  = 0 ###1 #0

# Default is 0, if OutputInYear = 1, then the output will combine 12-month results into annual result
# MAAC. 0 = output in month; 1 = aggregate into annual result.
# (unit will be mm/year or km3/year)
OutputInYear                = 0 ###1

# aggregate runoff by basin/country/region; Default is 0 for False, 1 for True
AggregateRunoffBasin        = 1 #1
AggregateRunoffCountry      = 1 #1
AggregateRunoffGCAMRegion   = 1 #1

# perform diagnostics defined in [Diagnostics]; Default is 0 for False, 1 for True
PerformDiagnostics          = 1

# create time series plots defined in [TimeSeriesPlot]; Default is 0 for False, 1 for True
CreateTimeSeriesPlot        = 0

# MAAC. calculate drought statistics; Default is 0 for False, 1 for True
CalculateDroughtStats       = 1

# MAAC. calculate accessible water; Default is 0 for False, 1 for True
CalculateAccessibleWater    = 1

# MAAC. calculate hydropower potential; Default is 0; if = 1
CalculateHydropowerPotential = 1

# MAAC. calculate hydropower actual; Default is 0 for False, 1 for True
CalculateHydropowerActual   = 1

# MAAC. run calibration mode; Default is 0 for False, 1 for True
# 1 = run ABCD runoff calibration module, 0 = pass.
Calibrate                   = 0


#****************************** PET %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

# set PET module type and individual parameters
[PET]
# name of the PET module you wish to use (e.g., penman-monteith)
# The reference name of the PET model to be used. Currently supported: pm (for Panman-Monteith), hargreaves (for Hargreaves), and none (for cases where the user will provide their own PET input file).
### MAAC pet_module                  = pm
pet_module                  = hs  # hargreaves-samani
### MAAC pet_module                  = hargreaves

[[penman-monteith]]
# directory name of the pet model
# The directory name of the PET module chosen where its input files are stored
pet_dir                     = penman_monteith

# monthly mean surface air temperature degrees C
# File name and extension to input mean monthly daily mean surface air temperature file in degree Celsius. Array must be 2-D, where (gridcell_idx, month_idx). File must be saved as a NumPy array file (.npy).
pm_tas                      = tas_watch_monthly_degc_1971_2001.npy

# monthly mean minimum temperature degrees C
#File name and extension to input mean monthly daily minimum surface air temperature file in degree Celsius. Array must be 2-D, where (gridcell_idx, month_idx). File must be saved as a NumPy array file (.npy).
pm_tmin                     = tasmin_watch_monthly_degc_1971_2001.npy

# relative humidity in percent
# File name and extension to input mean monthly relative humidity as a percentage. Array must be 2-D, where (gridcell_idx, month_idx). File must be saved as a NumPy array file (.npy).
pm_rhs                      = rhs_watch_monthly_percent_1971_2001.npy

# rlds
# File name and extension to input mean monthly surface downwelling longwave radiation in W m-2. Array must be 2-D, where (gridcell_idx, month_idx). File must be saved as a NumPy array file (.npy).
pm_rlds                     = rlds_watch_monthly_wperm2_1971_2001.npy

# rsds
# File name and extension to input mean monthly surface downwelling shortwave radiation in W m-2. Array must be 2-D, where (gridcell_idx, month_idx). File must be saved as a NumPy array file (.npy).
pm_rsds                     = rsds_watch_monthly_wperm2_1971_2001.npy

# wind
# File name and extension to input mean monthly wind speed in m/s. Array must be 2-D, where (gridcell_idx, month_idx). File must be saved as a NumPy array file (.npy).
pm_wind                     = wind_watch_monthly_mpers_1971_2001.npy

# land cover data
# File name and extension to input land cover data fraction per 67,420 grid cells. Array must be 3-D, where (gridcell_idx, landclass_idx, year_idx). File must be saved as a NumPy array file (.npy).
pm_lct                      = lucc1901_2010_lump.npy

# the number of land cover classes in the input data as an integer
pm_nlcs                     = 8

# the land class index, starting at 0, of water in the land cover data
# The number of the index (when starting at 0) of water in the land cover data as an integer.
pm_water_idx                = 0

# the land class index, starting at 0, of snow in the land cover data
# The number of the index (when starting at 0) of snow in the land cover data as an integer.
pm_snow_idx                 = 6

# a comma-separated string of years in the input land cover data
pm_lc_years                 = 1900, 1910, 1920, 1930, 1940, 1950, 1960, 1970, 1980, 1990, 2000, 2005, 2010


